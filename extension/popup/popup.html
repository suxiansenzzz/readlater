<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
    }
    
    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 16px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .content {
      padding: 16px;
    }
    
    .current-page {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
    }
    
    .current-page h3 {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
    }
    
    .current-page p {
      font-size: 14px;
      color: #1e293b;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 4px;
    }
    
    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #4f46e5;
    }
    
    .save-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }
    
    .save-btn:active {
      transform: translateY(0);
    }
    
    .save-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    
    .status.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }
    
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
    
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .footer a {
      color: #4f46e5;
      text-decoration: none;
      font-size: 12px;
    }
    
    .settings {
      padding: 8px 16px;
      border-top: 1px solid #e2e8f0;
    }
    
    .settings label {
      font-size: 12px;
      color: #64748b;
      display: block;
      margin-bottom: 4px;
    }
    
    .settings input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .shortcut-hint {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📖 ReadLater</h1>
    <p>一键保存网页</p>
  </div>
  
  <div class="content">
    <div class="current-page">
      <h3>当前页面</h3>
      <p id="pageTitle">加载中...</p>
    </div>
    
    <div class="form-group">
      <label>标签（用逗号分隔）</label>
      <input type="text" id="tags" placeholder="技术, 教程, 阅读">
    </div>
    
    <button class="save-btn" id="saveBtn" onclick="savePage()">
      💾 保存到稍后阅读
    </button>
    
    <div class="status" id="status"></div>
    
    <div class="shortcut-hint">
      快捷键: Alt+S 快速保存
    </div>
  </div>
  
  <div class="settings">
    <label>服务器地址：</label>
    <input type="text" id="serverUrl" placeholder="http://192.168.31.5:8000">
  </div>
  
  <div class="footer">
    <a href="#" id="openReadLater" target="_blank">打开 ReadLater →</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
